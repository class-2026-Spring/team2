<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeju Medical Guide - Hospital Status</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f3f4f6;
      }
      button {
        font-family: "Outfit", sans-serif;
        box-sizing: border-box;
        transition: all 0.2s ease;
      }
      /* AVAILABLE 상태일 때 깜빡이는 애니메이션 클래스 */
      .pulse {
        animation: blink 1.5s infinite alternate;
      }
      @keyframes blink {
        0% {
          opacity: 0.4;
          transform: scale(0.9);
        }
        100% {
          opacity: 1;
          transform: scale(1.1);
        }
      }
    </style>
  </head>
  <body>
    <div
      style="
        padding: 16px;
        font-family: &quot;Outfit&quot;, sans-serif;
        max-width: 480px;
        margin: 0 auto;
        background: #fff;
        min-height: 100vh;
        box-sizing: border-box;
      "
    >
      <div
        style="
          font-size: 18px;
          font-weight: 800;
          color: #111827;
          margin-bottom: 2px;
        "
      >
        Hospital Status
      </div>
      <div style="font-size: 12.5px; color: #6b7280; margin-bottom: 14px">
        Real-time emergency room availability in Jeju.
      </div>

      <button
        id="admin-toggle-btn"
        onclick="toggleAdminMode()"
        style="
          width: 100%;
          background: #f0fdfa;
          border: 1.5px solid #e5e7eb;
          border-radius: 12px;
          padding: 10px 14px;
          margin-bottom: 10px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          font-size: 13px;
          font-weight: 600;
          color: #6b7280;
        "
      >
        🔓 Turn On Admin Mode
      </button>

      <div
        id="admin-note"
        style="
          display: none;
          background: #fef2f2;
          border-radius: 10px;
          padding: 9px 13px;
          margin-bottom: 14px;
          font-size: 11.5px;
          color: #dc2626;
          border: 1px solid #fecaca;
          line-height: 1.55;
        "
      >
        ⚙️ <b>Admin Mode Active:</b> Click any status bar below to cycle through
        bed availability states (Available ➔ Busy ➔ Critical).
      </div>

      <div id="hospital-list"></div>
    </div>
  </body>
</html>
